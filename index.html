<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #050505;
  --card: #0a0a0a;
  --card-border: #151515;
  --card-active: #0e0e0e;
  --text: #f0f0f0;
  --text-dim: #888;
  --text-faint: #555;
  --green: #40916C;
  --red: #E63946;
  --orange: #F77F00;
  --blue: #3A86FF;
  --purple: #9B5DE5;
  --plum: #7B2D8E;
  --teal: #1B4332;
  --gray: #6B7280;
  --phase-foundation: #2D6A4F;
  --phase-build: #D4A017;
  --phase-peak: #C1121F;
  --phase-race: #1D3557;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* Header */
.header {
  padding: calc(var(--safe-top) + 20px) 20px 12px;
  background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
  position: sticky; top: 0; z-index: 100;
}
.header-label { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; color: var(--text-faint); text-transform: uppercase; margin-bottom: 6px; }
.header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; }
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* Nav tabs */
.nav { display: flex; gap: 4px; padding: 8px 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex: 0 0 auto; background: #111; border: 1px solid var(--card-border); color: var(--text-faint);
  font-size: 11px; font-weight: 500; padding: 5px 12px; border-radius: 16px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap; font-family: inherit;
}
.nav-btn.active { color: #fff; border-color: transparent; }

/* Info panels */
.panel { padding: 0 20px 16px; }
.panel-box { background: var(--card); border-radius: 14px; border: 1px solid var(--card-border); padding: 16px; }
.panel-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.panel-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.4; }
.panel-phase { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.panel-item { background: #141414; border-radius: 8px; padding: 8px 10px; margin-bottom: 4px; }
.panel-item-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.panel-item-detail { font-size: 10px; color: var(--text-dim); line-height: 1.5; }
.panel-item-mono { font-family: 'JetBrains Mono', monospace; }
.panel-exercise { font-size: 12px; color: #ccc; padding: 4px 0; border-bottom: 1px solid var(--card-border); }
.panel-exercise:last-child { border-bottom: none; }
.panel-note { font-size: 10px; color: var(--text-faint); margin-top: 6px; font-style: italic; }

/* Phase bar */
.phase-bar { display: flex; padding: 0 20px 8px; gap: 3px; }
.phase-bar-seg { height: 4px; border-radius: 2px; transition: background 0.3s; }

/* Week selector */
.weeks { display: flex; gap: 4px; padding: 4px 20px 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.weeks::-webkit-scrollbar { display: none; }
.week-btn {
  flex: 0 0 auto; background: #111; border: 1px solid var(--card-border); color: var(--text-faint);
  font-size: 12px; font-weight: 500; padding: 6px 10px; border-radius: 14px; cursor: pointer;
  transition: all 0.2s; min-width: 32px; text-align: center; font-family: inherit;
}
.week-btn.active { color: #fff; font-weight: 700; border: none; }
.week-btn.current:not(.active) { font-weight: 600; }

/* Week header */
.week-header { padding: 0 20px 14px; }
.week-header-box { border-radius: 12px; padding: 14px 16px; }
.week-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.week-header-num { font-size: 18px; font-weight: 700; }
.week-header-meta { display: flex; align-items: center; gap: 8px; }
.week-header-date { font-size: 11px; color: var(--text-dim); }
.week-header-phase { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 8px; border-radius: 10px; }
.week-header-focus { font-size: 13px; color: #aaa; line-height: 1.4; }
.week-progress { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }
.week-progress-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.week-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.week-progress-text { font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }

/* Day cards */
.days { padding: 0 20px; }
.day-card {
  background: var(--card); border: 1px solid var(--card-border); border-radius: 12px;
  margin-bottom: 6px; cursor: pointer; transition: all 0.2s; overflow: hidden;
}
.day-card.expanded { background: var(--card-active); }
.day-card.completed { opacity: 0.7; }
.day-summary { display: flex; align-items: center; padding: 12px 14px; gap: 10px; }
.day-icon { font-size: 16px; flex-shrink: 0; }
.day-info { flex: 1; }
.day-top { display: flex; justify-content: space-between; align-items: center; }
.day-name { font-size: 13px; font-weight: 600; }
.day-date { color: var(--text-faint); font-weight: 400; font-size: 11px; }
.day-total { font-size: 10px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
.day-label { font-size: 11px; font-weight: 500; margin-top: 1px; }
.day-arrow { font-size: 13px; color: #333; transition: transform 0.2s; }
.day-arrow.open { transform: rotate(90deg); }

/* Check button */
.check-btn {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid #333;
  background: transparent; color: transparent; font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.check-btn.done { border-color: var(--green); background: var(--green); color: #fff; }

/* Expanded content */
.day-detail { padding: 0 14px 14px; }
.segments { background: #060606; border-radius: 8px; overflow: hidden; }
.segment {
  display: flex; align-items: center; padding: 8px 10px;
  border-bottom: 1px solid var(--card-border); gap: 8px;
}
.segment:last-child { border-bottom: none; }
.segment.repeat-seg { position: relative; }
.segment .repeat-bar { width: 2px; align-self: stretch; border-radius: 1px; margin-right: -2px; flex-shrink: 0; }
.seg-content { flex: 1; }
.seg-top { display: flex; justify-content: space-between; align-items: center; }
.seg-name { font-size: 12px; font-weight: 600; }
.seg-meta { display: flex; gap: 6px; align-items: center; }
.seg-zone { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 5px; letter-spacing: 0.5px; }
.seg-dur { font-size: 12px; font-weight: 600; color: #bbb; font-family: 'JetBrains Mono', monospace; }
.seg-note { font-size: 10px; color: var(--text-faint); margin-top: 2px; line-height: 1.3; }

/* Notes */
.notes-area {
  margin-top: 8px; background: #060606; border-radius: 8px; border: 1px solid var(--card-border);
  overflow: hidden;
}
.notes-input {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 12px;
  resize: none; outline: none; min-height: 60px; line-height: 1.5;
}
.notes-input::placeholder { color: #333; }
.notes-saved { font-size: 10px; color: var(--green); padding: 0 12px 8px; }

/* HR Zones */
.zones { padding: 20px 20px calc(var(--safe-bottom) + 20px); }
.zones-box { background: var(--card); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--card-border); }
.zones-title { font-size: 11px; font-weight: 600; margin-bottom: 8px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; }
.zone-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--card-border); }
.zone-row:last-child { border-bottom: none; }
.zone-label { font-size: 10px; font-weight: 700; width: 22px; }
.zone-desc { font-size: 11px; color: #bbb; }
.zone-range { font-size: 10px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }

/* Overall progress */
.overall { padding: 16px 20px 0; }
.overall-box {
  background: var(--card); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--card-border);
  display: flex; align-items: center; gap: 14px;
}
.overall-ring {
  width: 52px; height: 52px; position: relative; flex-shrink: 0;
}
.overall-ring svg { transform: rotate(-90deg); }
.overall-ring-text {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
}
.overall-info { flex: 1; }
.overall-label { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.overall-detail { font-size: 11px; color: var(--text-dim); }

/* Reset button */
.reset-area { padding: 20px 20px 0; text-align: center; }
.reset-btn {
  background: transparent; border: 1px solid #222; color: #444; font-size: 11px;
  padding: 6px 16px; border-radius: 12px; cursor: pointer; font-family: inherit;
}
.reset-confirm { color: var(--red); border-color: var(--red); }

/* Analytics */
.analytics { padding: 20px 20px 0; }
.analytics-box { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--card-border); }
.analytics-title { font-size: 11px; font-weight: 600; margin-bottom: 12px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; }
.streak-grid { display: grid; grid-template-columns: repeat(17, 1fr); gap: 3px; margin-bottom: 12px; }
.streak-col { display: flex; flex-direction: column; gap: 2px; align-items: center; }
.streak-cell {
  width: 100%; aspect-ratio: 1; border-radius: 3px; background: rgba(255,255,255,0.04);
  transition: background 0.2s;
}
.streak-cell.done { background: var(--green); }
.streak-cell.partial { background: #2D6A4F88; }
.streak-week { font-size: 7px; color: var(--text-faint); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.streak-day-labels { display: flex; flex-direction: column; gap: 2px; margin-right: 4px; justify-content: flex-start; }
.streak-day-label { font-size: 7px; color: var(--text-faint); height: 0; display: flex; align-items: center; aspect-ratio: 1; font-family: 'JetBrains Mono', monospace; }
.streak-container { display: flex; align-items: flex-start; }
.streak-stats { display: flex; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--card-border); }
.streak-stat { flex: 1; text-align: center; }
.streak-stat-num { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.streak-stat-label { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
.streak-legend { display: flex; gap: 12px; margin-top: 10px; justify-content: center; }
.streak-legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--text-faint); }
.streak-legend-box { width: 8px; height: 8px; border-radius: 2px; }

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f5f5f0;
    --card: #fff;
    --card-border: #e8e8e4;
    --card-active: #fafaf8;
    --text: #111;
    --text-dim: #666;
    --text-faint: #999;
  }
  .header { background: linear-gradient(180deg, #eee 0%, var(--bg) 100%); }
  .nav-btn { background: #fff; }
  .week-btn { background: #fff; }
  .segments, .notes-area { background: #f8f8f6; }
  .segment { border-bottom-color: #e8e8e4; }
  .seg-dur { color: #444; }
  .notes-input { color: var(--text); }
  .notes-input::placeholder { color: #bbb; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── DATA ──
const START = new Date(2026, 3, 6);
const fmt = d => {
  const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug"];
  return `${m[d.getMonth()]} ${d.getDate()}`;
};
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };

const PHASES = [
  { name:"Foundation", weeks:[1,2,3,4], color:"#2D6A4F" },
  { name:"Build", weeks:[5,6,7,8], color:"#D4A017" },
  { name:"Peak", weeks:[9,10,11,12], color:"#C1121F" },
  { name:"Race Shape", weeks:[13,14,15,16,17], color:"#1D3557" },
];
const getPhase = w => PHASES.find(p => p.weeks.includes(w));

const ICONS = { EASY:"🟢", VO2MAX:"🔴", TEMPO:"🟠", PROGRESS:"🟣", SWIM:"🏊", PLAY:"🏐", REST:"😴", LONG:"🟤", CROSS:"🔵" };

const BW = {
  foundation: { label:"Foundation circuit — 2 rounds", exercises:["Push-ups: 12 reps","Bodyweight squats: 15 reps","Plank: 30 sec hold","Glute bridges: 12 reps","Dead bugs: 10 per side","Superman holds: 15 sec hold"], note:"All 6 exercises back-to-back, rest 60-90 sec, repeat once more. ~20 min." },
  build: { label:"Build circuit — 3 rounds", exercises:["Push-ups: 15 reps (or diamond: 10)","Bulgarian split squats: 10/leg","Plank: 45 sec hold","Single-leg glute bridge: 10/leg","Bicycle crunches: 15/side","Pike push-ups: 8 reps","Lateral lunges: 10/side"], note:"All 7 exercises back-to-back, rest 60 sec, repeat 2 more times. ~25 min." },
  peak: { label:"Peak circuit — 3 rounds", exercises:["Decline push-ups: 15 reps","Pistol squat progressions: 6/leg","Plank w/ shoulder taps: 60 sec","Single-leg glute bridge: 12/leg","Hanging leg raises (or lying): 12 reps","Pike push-ups: 12 reps","Jump squats: 10 reps","Side plank: 30 sec/side"], note:"All 8 exercises back-to-back, rest 60 sec, repeat 2 more times. ~30 min." },
  raceShape: { label:"Race Shape circuit — 2 rounds", exercises:["Push-up variation: 15 reps","Jump squats: 8 reps","Plank w/ shoulder taps: 45 sec","Single-leg RDL: 8/leg","V-ups: 12 reps","Burpees: 6 reps"], note:"All 6 back-to-back, rest 60-90 sec, repeat once more. ~20 min." },
};
const getBW = w => w<=4?BW.foundation:w<=8?BW.build:w<=12?BW.peak:BW.raceShape;

const SWIM = {
  foundation: { dur:"20-25 min", desc:"Easy laps, any stroke. Focus on breathing rhythm.", goal:"Get comfortable" },
  build: { dur:"25-30 min", desc:"2 laps easy / 1 lap hard, or 4×50m w/ 20 sec rest.", goal:"Build swim fitness" },
  peak: { dur:"30-35 min", desc:"Pyramid: 1-2-3-4-3-2-1 laps hard w/ 15-20 sec rest.", goal:"Real cardio work" },
  raceShape: { dur:"25-30 min", desc:"Easy-moderate. Freestyle + backstroke alternating.", goal:"Recovery & mobility" },
};
const getSwim = w => w<=4?SWIM.foundation:w<=8?SWIM.build:w<=12?SWIM.peak:SWIM.raceShape;

const WATCH = [
  { phase:"Weeks 1-4: Foundation", color:"#2D6A4F", items:[
    {n:"Easy 20",s:"WU 5:00 → Run 20:00 (Z2) → CD 3:00"},{n:"Easy 25",s:"WU 5:00 → Run 25:00 (Z2) → CD 3:00"},
    {n:"VO2 5×(4+1)",s:"WU 5:00 → ×5: [Run 4:00 + Recover 1:00] → CD 3:00"},
    {n:"VO2 5×(4+1:30)",s:"WU 5:00 → ×5: [Run 4:00 + Recover 1:30] → CD 3:00"},
    {n:"Tempo 15",s:"WU 5:00 → Run 15:00 (Z3) → CD 3:00"},{n:"Tempo 20",s:"WU 5:00 → Run 20:00 (Z3) → CD 3:00"},
  ]},
  { phase:"Weeks 5-8: Build", color:"#D4A017", items:[
    {n:"Easy 30",s:"WU 5:00 → Run 30:00 (Z2) → CD 3:00"},
    {n:"VO2 6×(4+1:30)",s:"WU 5:00 → ×6: [Run 4:00 + Recover 1:30] → CD 3:00"},
    {n:"VO2 6×(4+1)",s:"WU 5:00 → ×6: [Run 4:00 + Recover 1:00] → CD 3:00"},
    {n:"Tempo 2×10",s:"WU 5:00 → Run 10:00 (Z3) → Easy 2:00 → Run 10:00 (Z3) → CD 3:00"},
    {n:"Tempo 25",s:"WU 5:00 → Run 25:00 (Z3) → CD 3:00"},
    {n:"Long 35",s:"WU 5:00 → Run 35:00 (Z2) → CD 5:00"},{n:"Long 40",s:"WU 5:00 → Run 40:00 (Z2) → CD 5:00"},
    {n:"Progression v1",s:"WU 5:00 → Z2 10:00 → Z3 10:00 → Z4 5:00 → CD 3:00"},
  ]},
  { phase:"Weeks 9-12: Peak", color:"#C1121F", items:[
    {n:"Easy 35",s:"WU 5:00 → Run 35:00 (Z2) → CD 3:00"},
    {n:"VO2 7×(4+1)",s:"WU 5:00 → ×7: [Run 4:00 + Recover 1:00] → CD 3:00"},
    {n:"Tempo 2×12",s:"WU 5:00 → Run 12:00 (Z3) → Easy 2:00 → Run 12:00 (Z3) → CD 3:00"},
    {n:"Tempo 30",s:"WU 5:00 → Run 30:00 (Z3) → CD 3:00"},
    {n:"Long 45",s:"WU 5:00 → Run 45:00 (Z2) → CD 5:00"},{n:"Long 50",s:"WU 5:00 → Run 50:00 (Z2) → CD 5:00"},
    {n:"Progression v2",s:"WU 5:00 → Z2 12:00 → Z3 10:00 → Z4 8:00 → CD 3:00"},
  ]},
  { phase:"Weeks 13-17: Race Shape", color:"#1D3557", items:[
    {n:"VO2 6×(3+1)",s:"WU 5:00 → ×6: [Run 3:00 + Recover 1:00] → CD 3:00"},
    {n:"VO2 8×(2+1)",s:"WU 5:00 → ×8: [Run 2:00 + Recover 1:00] → CD 3:00"},
    {n:"VO2 4×(3+1:30)",s:"WU 5:00 → ×4: [Run 3:00 + Recover 1:30] → CD 3:00"},
    {n:"Long 35",s:"WU 5:00 → Run 35:00 (Z2) → CD 5:00"},
  ]},
];

const BW_PHASES = [
  { label:"Weeks 1-4", ...BW.foundation, color:"#2D6A4F" },
  { label:"Weeks 5-8", ...BW.build, color:"#D4A017" },
  { label:"Weeks 9-12", ...BW.peak, color:"#C1121F" },
  { label:"Weeks 13-17", ...BW.raceShape, color:"#1D3557" },
];

const SWIM_PHASES = [
  { label:"Weeks 1-4", ...SWIM.foundation, color:"#2D6A4F" },
  { label:"Weeks 5-8", ...SWIM.build, color:"#D4A017" },
  { label:"Weeks 9-12", ...SWIM.peak, color:"#C1121F" },
  { label:"Weeks 13-17", ...SWIM.raceShape, color:"#1D3557" },
];

function buildWeek(w) {
  const phase = getPhase(w);
  const bw = getBW(w);
  const swim = getSwim(w);
  let easyDur,tempoSpec,vo2Spec,longRunDur;

  if(w<=2){easyDur=20;tempoSpec={dur:15};vo2Spec={reps:5,work:4,rest:1};longRunDur=null;}
  else if(w<=4){easyDur=25;tempoSpec={dur:20};vo2Spec={reps:5,work:4,rest:1.5};longRunDur=null;}
  else if(w<=6){easyDur=30;tempoSpec={dur:20,blocks:2,bd:10,rec:2};vo2Spec={reps:6,work:4,rest:1.5};longRunDur=35;}
  else if(w<=8){easyDur=30;tempoSpec={dur:25};vo2Spec={reps:6,work:4,rest:1};longRunDur=40;}
  else if(w<=10){easyDur=30;tempoSpec={dur:25,blocks:2,bd:12,rec:2};vo2Spec={reps:7,work:4,rest:1};longRunDur=45;}
  else if(w<=12){easyDur=35;tempoSpec={dur:30};vo2Spec={reps:7,work:4,rest:1};longRunDur=50;}
  else if(w<=14){easyDur=30;tempoSpec={dur:25};vo2Spec={reps:6,work:3,rest:1,note:"Shorter & faster — 5K race pace"};longRunDur=40;}
  else if(w<=16){easyDur=25;tempoSpec={dur:20};vo2Spec={reps:8,work:2,rest:1,note:"Short & sharp — faster than 5K pace"};longRunDur=35;}
  else{easyDur=25;tempoSpec={dur:15,note:"Shakeout — smooth"};vo2Spec={reps:4,work:3,rest:1.5,note:"Light sharpener"};longRunDur=null;}

  const tempoSegs = [{name:"Warm-Up",dur:"5:00",zone:"Z1-2",note:"Easy jog"}];
  if(tempoSpec.blocks){
    for(let i=1;i<=tempoSpec.blocks;i++){
      tempoSegs.push({name:`Tempo Block ${i}`,dur:`${tempoSpec.bd}:00`,zone:"Z3-4",note:tempoSpec.note||"Comfortably hard",repeat:true});
      if(i<tempoSpec.blocks) tempoSegs.push({name:"Easy Recovery",dur:`${tempoSpec.rec}:00`,zone:"Z2",note:"Jog easy"});
    }
  } else {
    tempoSegs.push({name:"Tempo",dur:`${tempoSpec.dur}:00`,zone:"Z3-4",note:tempoSpec.note||"Comfortably hard — sustained"});
  }
  tempoSegs.push({name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"});
  const tempoTot = tempoSpec.blocks ? 5+(tempoSpec.bd*tempoSpec.blocks)+(tempoSpec.rec*(tempoSpec.blocks-1))+3 : 5+tempoSpec.dur+3;

  const restFmt = vo2Spec.rest>=1 ? (vo2Spec.rest%1===0?`${vo2Spec.rest}:00`:`${Math.floor(vo2Spec.rest)}:30`) : `0:${vo2Spec.rest*60}`;
  const vo2Tot = 5+(vo2Spec.reps*(vo2Spec.work+vo2Spec.rest))+3;

  const poolTue = w>=5;
  const poolSat = w>=4;

  if(w===1){

      {day:"Tue",date:fmt(addDays(START,1)),type:"VO2MAX",label:"VO₂max Intervals",color:"#E63946",segments:[
        {name:"Warm-Up",dur:"5:00",zone:"Z1-2",note:"Easy jog"},
        {name:"Hard Run",dur:"4:00",zone:"Z4-5",note:"8:30/mi — done!",repeat:true},
        {name:"Recovery",dur:"1:00",zone:"Z1",note:"Walk",repeat:true},
        {name:"↻ Repeat",dur:"×5",zone:"",note:"Completed at 8:30 pace"},
        {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
      ],total:"33 min"},
      {day:"Wed",date:fmt(addDays(START,2)),type:"EASY",label:"Easy Run",color:"#40916C",segments:[
        {name:"Warm-Up",dur:"5:00",zone:"Z1",note:"Walk → jog"},
        {name:"Easy Run",dur:"20:00",zone:"Z2",note:"130-145 bpm. Way slower than yesterday."},
        {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
      ],total:"28 min"},
      {day:"Thu",date:fmt(addDays(START,3)),type:"TEMPO",label:"Tempo Run",color:"#F77F00",segments:tempoSegs,total:`${tempoTot} min`},
      {day:"Fri",date:fmt(addDays(START,4)),type:"EASY",label:"Easy Run + Bodyweight",color:"#40916C",segments:[
        {name:"Warm-Up",dur:"5:00",zone:"Z1",note:"Walk → jog"},
        {name:"Easy Run",dur:"20:00",zone:"Z2",note:"Same as Wednesday"},
        {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
        {name:"Bodyweight",dur:"~20 min",zone:"Strength",note:bw.label},
      ],total:"48 min"},
      {day:"Sat",date:fmt(addDays(START,5)),type:"CROSS",label:"Walk or Hike",color:"#6B7280",segments:[
        {name:"Easy Walk",dur:"40-50 min",zone:"Z1",note:"No pool yet — get outside, stay loose."},
      ],total:"40-50 min"},
      {day:"Sun",date:fmt(addDays(START,6)),type:"PLAY",label:"Beach Volleyball",color:"#9B5DE5",segments:[
        {name:"Beach Volleyball",dur:"As long as you want",zone:"Fun",note:"Natural interval training"},
      ],total:"Enjoy"},
    ]};
  }

  const days = [
    {day:"Mon",date:fmt(weekStart),type:"EASY",label:"Easy Run",color:"#40916C",segments:[
      {name:"Warm-Up",dur:"5:00",zone:"Z1",note:"Walk → jog"},
      {name:"Easy Run",dur:`${easyDur}:00`,zone:"Z2",note:"Conversational. 130-145 bpm."},
      {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
    ],total:`${easyDur+8} min`},

    poolTue
      ? {day:"Tue",date:fmt(addDays(weekStart,1)),type:"SWIM",label:"Swim + Bodyweight",color:"#3A86FF",segments:[
          {name:"Swim",dur:swim.dur,zone:"Cardio",note:swim.desc},
          {name:"Bodyweight",dur:"~20 min",zone:"Strength",note:bw.label},
        ],total:"45-55 min"}
      : {day:"Tue",date:fmt(addDays(weekStart,1)),type:"CROSS",label:"Walk + Bodyweight",color:"#6B7280",segments:[
          {name:"Brisk Walk",dur:"30:00",zone:"Z1-2",note:"Active recovery for your legs"},
          {name:"Bodyweight",dur:"~20 min",zone:"Strength",note:bw.label},
        ],total:"~50 min"},

    {day:"Wed",date:fmt(addDays(weekStart,2)),type:"VO2MAX",label:"VO₂max Intervals",color:"#E63946",segments:[
      {name:"Warm-Up",dur:"5:00",zone:"Z1-2",note:"Easy jog"},
      {name:"Hard Run",dur:`${vo2Spec.work}:00`,zone:"Z4-5",note:vo2Spec.note||"Hard but controlled — RPE 8/10",repeat:true},
      {name:"Recovery",dur:restFmt,zone:"Z1",note:"Walk or very slow jog",repeat:true},
      {name:"↻ Repeat",dur:`×${vo2Spec.reps}`,zone:"",note:`${vo2Spec.reps} rounds`},
      {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
    ],total:`${Math.round(vo2Tot)} min`},

    isEven&&w>=4
      ? {day:"Thu",date:fmt(addDays(weekStart,3)),type:"PROGRESS",label:"Progression Run",color:"#7B2D8E",segments:[
          {name:"Warm-Up",dur:"5:00",zone:"Z1",note:"Walk → jog"},
          {name:"Easy",dur:w<=8?"10:00":"12:00",zone:"Z2",note:"Settle in"},
          {name:"Moderate",dur:"10:00",zone:"Z3",note:"Pick it up"},
          {name:"Hard",dur:w<=8?"5:00":w<=12?"8:00":"5:00",zone:"Z4",note:"Finish strong"},
          {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
        ],total:`${5+(w<=8?25:w<=12?30:25)+3} min`}
      : {day:"Thu",date:fmt(addDays(weekStart,3)),type:"EASY",label:"Easy Run + Bodyweight",color:"#40916C",segments:[
          {name:"Warm-Up",dur:"5:00",zone:"Z1",note:"Walk → jog"},
          {name:"Easy Run",dur:`${easyDur}:00`,zone:"Z2",note:"Easy — recovery from yesterday's intervals"},
          {name:"Cool-Down",dur:"3:00",zone:"Z1",note:"Walk"},
          {name:"Bodyweight",dur:"~20 min",zone:"Strength",note:bw.label},
        ],total:`${easyDur+28} min`},

    {day:"Fri",date:fmt(addDays(weekStart,4)),type:"TEMPO",label:"Tempo Run",color:"#F77F00",segments:tempoSegs,total:`${tempoTot} min`},

    hasLong
      ? {day:"Sat",date:fmt(addDays(weekStart,5)),type:"LONG",label:"Long Easy Run",color:"#1B4332",segments:[
          {name:"Warm-Up",dur:"5:00",zone:"Z1",note:"Walk → easy jog"},
          {name:"Long Run",dur:`${longRunDur}:00`,zone:"Z2",note:"Easy pace the entire time. Build your engine."},
          {name:"Cool-Down",dur:"5:00",zone:"Z1",note:"Walk, stretch"},
        ],total:`${longRunDur+10} min`}
      : poolSat
        ? {day:"Sat",date:fmt(addDays(weekStart,5)),type:"SWIM",label:"Pool Session",color:"#3A86FF",segments:[
            {name:"Swim",dur:swim.dur,zone:"Easy",note:swim.desc},

        : {day:"Sat",date:fmt(addDays(weekStart,5)),type:"CROSS",label:"Walk or Hike",color:"#6B7280",segments:[
            {name:"Easy Walk",dur:"40-50 min",zone:"Z1",note:"No pool yet. Get outside, stay loose."},
          ],total:"40-50 min"},

    {day:"Sun",date:fmt(addDays(weekStart,6)),type:"PLAY",label:"Beach Volleyball",color:"#9B5DE5",segments:[
      {name:"Beach Volleyball",dur:"As long as you want",zone:"Fun",note:"Sprint, jump, recover"},
    ],total:"Enjoy"},
  ];

  return { week:w, phase:phase.name, phaseColor:phase.color, focus:phase.name==="Foundation"?"Build the aerobic base & movement habits":phase.name==="Build"?"Add volume & intensity across all three":phase.name==="Peak"?"Highest training load — push your ceiling":"Sharpen speed, maintain strength, test yourself", startDate:fmt(weekStart), days };
}

const ALL_WEEKS = Array.from({length:17},(_,i)=>buildWeek(i+1));

// ── STORAGE ──
const STORE_KEY = "summer_engine_v1";
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
function getDone(w,di) { const d=loadData(); return !!(d[`${w}-${di}`]?.done); }
function setDone(w,di,v) { const d=loadData(); if(!d[`${w}-${di}`]) d[`${w}-${di}`]={}; d[`${w}-${di}`].done=v; saveData(d); }
function getNote(w,di) { const d=loadData(); return d[`${w}-${di}`]?.note||""; }
function setNote(w,di,v) { const d=loadData(); if(!d[`${w}-${di}`]) d[`${w}-${di}`]={}; d[`${w}-${di}`].note=v; saveData(d); }
function getWeekDone(w) { const wk=ALL_WEEKS[w]; let c=0; wk.days.forEach((_,i)=>{ if(getDone(wk.week,i)) c++; }); return c; }
function getTotalDone() { let c=0; ALL_WEEKS.forEach(wk=>wk.days.forEach((_,i)=>{ if(getDone(wk.week,i)) c++; })); return c; }

// ── RENDER ──
let state = { week:0, expanded:null, panel:null, resetConfirm:false };

// Auto-select current week
const now = new Date();
const diffW = Math.floor((now-START)/(7*24*60*60*1000));
if(diffW>=0 && diffW<17) state.week = diffW;

function h(tag, props, ...children) {
  const el = document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v]) => {
    if(k==='style'&&typeof v==='object') Object.assign(el.style,v);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className') el.className=v;
    else if(k==='innerHTML') el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c => {
    if(c==null) return;
    el.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
  });
  return el;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const wk = ALL_WEEKS[state.week];
  const phase = getPhase(wk.week);
  const weekDone = getWeekDone(state.week);
  const totalDone = getTotalDone();
  const totalWorkouts = 17*7;
  const pct = Math.round((totalDone/totalWorkouts)*100);

  // Header
  app.appendChild(h('div',{className:'header'},
    h('div',{className:'header-label'},'Apr 6 → Aug 1 · 17 Weeks'),
    h('h1',null,'MySpeckTrainer'),
    h('div',{className:'header-sub'},'Run · Swim · Bodyweight · Volleyball'),
  ));

  // Nav
  const nav = h('div',{className:'nav'});
  [{key:'watch',icon:'⌚',label:'Watch'},{key:'bodyweight',icon:'💪',label:'Bodyweight'},{key:'swim',icon:'🏊',label:'Swim'}].forEach(p => {
    const btn = h('button',{className:`nav-btn${state.panel===p.key?' active':''}`,onClick:()=>{state.panel=state.panel===p.key?null:p.key;render();}},`${p.icon} ${p.label}`);
    if(state.panel===p.key) btn.style.background='#222';
    nav.appendChild(btn);
  });
  app.appendChild(nav);

  // Panels
  if(state.panel==='watch') {
    const box = h('div',{className:'panel-box'}, h('div',{className:'panel-title'},'Custom Workouts to Program'), h('div',{className:'panel-desc'},'Watch app → Workout → Custom. Build as you enter each phase.'));
    WATCH.forEach(ph => {
      box.appendChild(h('div',{className:'panel-phase',style:{color:ph.color,marginTop:'12px'}},ph.phase));
      ph.items.forEach(it => box.appendChild(h('div',{className:'panel-item'}, h('div',{className:'panel-item-name'},it.n), h('div',{className:'panel-item-detail panel-item-mono'},it.s))));
    });
    app.appendChild(h('div',{className:'panel'},box));
  }
  if(state.panel==='bodyweight') {
    const box = h('div',{className:'panel-box'}, h('div',{className:'panel-title'},'Bodyweight Progressions'), h('div',{className:'panel-desc'},'Done 2-3× per week after easy runs or on swim days.'));
    BW_PHASES.forEach(ph => {
      box.appendChild(h('div',{className:'panel-phase',style:{color:ph.color,marginTop:'12px'}},ph.label));
      ph.exercises.forEach(ex => box.appendChild(h('div',{className:'panel-exercise'},ex)));
      box.appendChild(h('div',{className:'panel-note'},ph.note));
    });
    app.appendChild(h('div',{className:'panel'},box));
  }
  if(state.panel==='swim') {
    const box = h('div',{className:'panel-box'}, h('div',{className:'panel-title'},'Swim Progressions'), h('div',{className:'panel-desc'},'Pool opens May 1. Great cardio that gives joints a break.'));
    SWIM_PHASES.forEach(s => {
      const item = h('div',{className:'panel-item',style:{marginTop:'8px'}},
        h('div',{className:'panel-phase',style:{color:s.color}},s.label),
        h('div',{className:'panel-item-name',style:{marginTop:'4px'}},`${s.dur} — ${s.goal}`),
        h('div',{className:'panel-item-detail'},s.desc),
      );
      box.appendChild(item);
    });
    app.appendChild(h('div',{className:'panel'},box));
  }

  // Overall progress
  const circumference = 2*Math.PI*20;
  const dashoffset = circumference - (pct/100)*circumference;
  app.appendChild(h('div',{className:'overall'},
    h('div',{className:'overall-box'},
      h('div',{className:'overall-ring',innerHTML:`<svg width="52" height="52" viewBox="0 0 52 52"><circle cx="26" cy="26" r="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/><circle cx="26" cy="26" r="20" fill="none" stroke="${phase.color}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${dashoffset}"/></svg><div class="overall-ring-text">${pct}%</div>`}),
      h('div',{className:'overall-info'},
        h('div',{className:'overall-label'},'Program Progress'),
        h('div',{className:'overall-detail'},`${totalDone} of ${totalWorkouts} sessions completed`),
      ),
    ),
  ));

  // Phase bar
  const pbar = h('div',{className:'phase-bar',style:{marginTop:'16px'}});
  PHASES.forEach(p => {
    const seg = h('div',{className:'phase-bar-seg'});
    seg.style.flex = p.weeks.length;
    seg.style.background = p.weeks.includes(wk.week) ? p.color : p.color+'33';
    pbar.appendChild(seg);
  });
  app.appendChild(pbar);

  // Week selector
  const weeks = h('div',{className:'weeks'});
  ALL_WEEKS.forEach((w,i) => {
    const p = getPhase(w.week);
    const isCurr = w.week === diffW+1;
    const btn = h('button',{className:`week-btn${state.week===i?' active':''}${isCurr&&state.week!==i?' current':''}`,onClick:()=>{state.week=i;state.expanded=null;render();}},String(w.week));
    if(state.week===i) { btn.style.background=p.color; btn.style.color='#fff'; btn.style.border='none'; }
    else if(isCurr) { btn.style.borderColor=p.color; btn.style.color=p.color; }
    weeks.appendChild(btn);
  });
  app.appendChild(weeks);

  // Week header
  const whBox = h('div',{className:'week-header-box',style:{background:`linear-gradient(135deg,${phase.color}18,${phase.color}06)`,border:`1px solid ${phase.color}33`}},
    h('div',{className:'week-header-top'},
      h('span',{className:'week-header-num'},`Week ${wk.week}`),
      h('div',{className:'week-header-meta'},
        h('span',{className:'week-header-date'},wk.startDate),
        h('span',{className:'week-header-phase',style:{color:phase.color,background:phase.color+'18'}},phase.name),
      ),
    ),
    h('div',{className:'week-header-focus'},wk.focus),
    h('div',{className:'week-progress'},
      h('div',{className:'week-progress-bar'},h('div',{className:'week-progress-fill',style:{width:`${Math.round(weekDone/7*100)}%`,background:phase.color}})),
      h('span',{className:'week-progress-text'},`${weekDone}/7`),
    ),
  );
  app.appendChild(h('div',{className:'week-header'},whBox));

  // Days
  const daysEl = h('div',{className:'days'});
  wk.days.forEach((day,di) => {
    const isExp = state.expanded===di;
    const isDone = getDone(wk.week,di);
    const card = h('div',{className:`day-card${isExp?' expanded':''}${isDone?' completed':''}`});
    if(isExp) card.style.borderColor=day.color+'33';

    const summary = h('div',{className:'day-summary'});
    summary.appendChild(h('span',{className:'day-icon'},ICONS[day.type]||'⚪'));

    const info = h('div',{className:'day-info'});
    info.appendChild(h('div',{className:'day-top'},
      h('span',{className:'day-name'},day.day+' ',h('span',{className:'day-date'},day.date)),
      h('span',{className:'day-total'},day.total),
    ));
    info.appendChild(h('div',{className:'day-label',style:{color:day.color}},day.label));
    info.addEventListener('click',()=>{state.expanded=isExp?null:di;render();});
    summary.appendChild(info);

    // Check button
    const check = h('button',{className:`check-btn${isDone?' done':''}`,onClick:(e)=>{e.stopPropagation();setDone(wk.week,di,!isDone);render();}},isDone?'✓':'');
    summary.appendChild(check);

    const arrow = h('span',{className:`day-arrow${isExp?' open':''}`},'›');
    arrow.addEventListener('click',()=>{state.expanded=isExp?null:di;render();});
    summary.appendChild(arrow);

    card.appendChild(summary);

    if(isExp) {
      const detail = h('div',{className:'day-detail'});
      const segs = h('div',{className:'segments'});
      day.segments.forEach(seg => {
        const segEl = h('div',{className:`segment${seg.repeat?' repeat-seg':''}`});
        if(seg.repeat) { const bar=h('div',{className:'repeat-bar'}); bar.style.background=day.color; segEl.appendChild(bar); }
        if(seg.repeat) segEl.style.background=day.color+'06';
        const content = h('div',{className:'seg-content'});
        const top = h('div',{className:'seg-top'},h('span',{className:'seg-name'},seg.name));
        const meta = h('div',{className:'seg-meta'});
        if(seg.zone) { const z=h('span',{className:'seg-zone'}); z.style.color=day.color; z.style.background=day.color+'14'; z.textContent=seg.zone; meta.appendChild(z); }
        meta.appendChild(h('span',{className:'seg-dur'},seg.dur));
        top.appendChild(meta);
        content.appendChild(top);
        if(seg.note) content.appendChild(h('div',{className:'seg-note'},seg.note));
        segEl.appendChild(content);
        segs.appendChild(segEl);
      });
      detail.appendChild(segs);

      // Notes
      const noteVal = getNote(wk.week,di);
      const notesArea = h('div',{className:'notes-area'});
      const textarea = h('textarea',{className:'notes-input',placeholder:'Add notes — how it felt, pace, etc...'});
      textarea.value = noteVal;
      let saveTimeout;
      textarea.addEventListener('input',()=>{
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(()=>{
          setNote(wk.week,di,textarea.value);
          const saved = notesArea.querySelector('.notes-saved');
          if(saved) saved.textContent = 'Saved ✓';
          setTimeout(()=>{ if(saved) saved.textContent=''; },1500);
        },500);
      });
      textarea.addEventListener('click',(e)=>e.stopPropagation());
      notesArea.appendChild(textarea);
      notesArea.appendChild(h('div',{className:'notes-saved'},''));
      detail.appendChild(notesArea);

      card.appendChild(detail);
    }
    daysEl.appendChild(card);
  });
  app.appendChild(daysEl);

  // Analytics Dashboard
  const analyticsBox = h('div',{className:'analytics-box'});
  analyticsBox.appendChild(h('div',{className:'analytics-title'},'Completion Streaks'));

  // Build streak grid — 17 columns (weeks) × 7 rows (days)
  const streakContainer = h('div',{className:'streak-container'});

  // Day labels
  const dayLabels = h('div',{className:'streak-day-labels'});
  ['M','T','W','T','F','S','S'].forEach(d => {
    const lbl = h('div',{className:'streak-day-label'});
    lbl.textContent = d;
    dayLabels.appendChild(lbl);
  });
  streakContainer.appendChild(dayLabels);

  const grid = h('div',{className:'streak-grid'});
  // Calculate streaks while building grid
  let currentStreak = 0;
  let longestStreak = 0;
  let tempStreak = 0;
  let perfectWeeks = 0;

  ALL_WEEKS.forEach((wk,wi) => {
    const col = h('div',{className:'streak-col'});
    let weekComplete = 0;
    wk.days.forEach((_,di) => {
      const done = getDone(wk.week, di);
      const cell = h('div',{className:`streak-cell${done?' done':''}`});
      if(done) weekComplete++;
      col.appendChild(cell);

      // Streak tracking (linear through all days)
      if(done) {
        tempStreak++;
        if(tempStreak > longestStreak) longestStreak = tempStreak;
      } else {
        tempStreak = 0;
      }
    });
    if(weekComplete === 7) perfectWeeks++;
    col.appendChild(h('div',{className:'streak-week'},String(wk.week)));
    grid.appendChild(col);
  });

  // Current streak = count backwards from today
  currentStreak = 0;
  const todayIdx = Math.floor((now - START) / (24*60*60*1000));
  for(let i = todayIdx; i >= 0; i--) {
    const wi = Math.floor(i/7);
    const di = i%7;
    if(wi < 17 && getDone(ALL_WEEKS[wi].week, di)) currentStreak++;
    else break;
  }

  streakContainer.appendChild(grid);
  analyticsBox.appendChild(streakContainer);

  // Legend
  const legend = h('div',{className:'streak-legend'});
  legend.appendChild(h('div',{className:'streak-legend-item'},
    h('div',{className:'streak-legend-box',style:{background:'rgba(255,255,255,0.04)'}}),

  ));
  legend.appendChild(h('div',{className:'streak-legend-item'},
    h('div',{className:'streak-legend-box',style:{background:'var(--green)'}}),
    'Completed'
  ));
  analyticsBox.appendChild(legend);

  // Stats row
  const stats = h('div',{className:'streak-stats'});
  [
    {num: currentStreak, label: 'Current streak'},
    {num: longestStreak, label: 'Longest streak'},
    {num: perfectWeeks, label: 'Perfect weeks'},
  ].forEach(s => {
    const stat = h('div',{className:'streak-stat'});
    const numEl = h('div',{className:'streak-stat-num'});
    numEl.style.color = s.num > 0 ? 'var(--green)' : 'var(--text-faint)';
    numEl.textContent = s.num;
    stat.appendChild(numEl);
    stat.appendChild(h('div',{className:'streak-stat-label'},s.label));
    stats.appendChild(stat);
  });
  analyticsBox.appendChild(stats);

  app.appendChild(h('div',{className:'analytics'},analyticsBox));

  // HR Zones
  const zonesBox = h('div',{className:'zones-box'},h('div',{className:'zones-title'},'Heart Rate Zones'));
  [{z:"Z1",r:"< 130",d:"Recovery",c:"#6B7280"},{z:"Z2",r:"130-145",d:"Easy / base",c:"#40916C"},{z:"Z3",r:"155-165",d:"Tempo",c:"#F77F00"},{z:"Z4",r:"165-175",d:"VO₂max",c:"#E63946"},{z:"Z5",r:"175+",d:"Max",c:"#C1121F"}].forEach(z => {
    zonesBox.appendChild(h('div',{className:'zone-row'},
      h('span',{className:'zone-label',style:{color:z.c}},z.z),
      h('span',{className:'zone-desc'},z.d),
      h('span',{className:'zone-range'},z.r+' bpm'),
    ));
  });
  app.appendChild(h('div',{className:'zones'},zonesBox));

  // Reset
  const resetArea = h('div',{className:'reset-area'});
  if(state.resetConfirm) {
    resetArea.appendChild(h('button',{className:'reset-btn reset-confirm',onClick:()=>{localStorage.removeItem(STORE_KEY);state.resetConfirm=false;render();}}, 'Tap again to confirm reset'));
    resetArea.appendChild(h('button',{className:'reset-btn',style:{marginLeft:'8px'},onClick:()=>{state.resetConfirm=false;render();}}, 'Cancel'));
  } else {
    resetArea.appendChild(h('button',{className:'reset-btn',onClick:()=>{state.resetConfirm=true;render();}}, 'Reset all progress'));
  }
  app.appendChild(resetArea);

  // Scroll week button into view
  setTimeout(()=>{
    const activeBtn = document.querySelector('.week-btn.active');
    if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },50);
}

render();
</script>
</body>
</html>
